name: Evening Post — Reel 2 (6 PM IST)

on:
  schedule:
    - cron: '30 12 * * *'  # 12:30 PM UTC = 6:00 PM IST (UTC+5:30)
  workflow_dispatch:

concurrency:
  group: vedalingo-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (with LFS videos)
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd automation && npm install

      - name: Get today's reel info
        id: reel
        run: |
          node -e "
          const fs = require('fs');
          const state = JSON.parse(fs.readFileSync('automation/post-state.json', 'utf8'));
          const day = String(state.currentDay).padStart(3, '0');
          const batch = state.currentBatch || 1;
          const folder = batch === 1 ? 'output' : 'output/batch-' + batch;
          const dayFolder = folder + '/day-' + day;
          const files = fs.readdirSync(dayFolder).filter(f => f.includes('_R2_'));
          const file = files[0];
          const match = file.match(/_([^_]+)_([^.]+)\.mp4/);
          const type = match[1];
          const contentId = match[2];
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'day=' + state.currentDay + '\n');
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'file=' + dayFolder + '/' + file + '\n');
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'type=' + type + '\n');
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'contentId=' + contentId + '\n');
          console.log('Day:', state.currentDay, 'File:', file);
          "

      - name: Generate caption
        id: caption
        run: |
          node -e "
          const { generateCaption } = require('./automation/lib/captions.js');
          const type = '${{ steps.reel.outputs.type }}';
          const contentId = '${{ steps.reel.outputs.contentId }}';
          const day = ${{ steps.reel.outputs.day }};
          const caption = generateCaption(type, contentId, day, 'evening');
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'caption=' + caption.replace(/\n/g, '\n') + '\n');
          "

      - name: Upload video to GitHub release (public URL for Make)
        id: upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE="${{ steps.reel.outputs.file }}"
          FILENAME=$(basename "$FILE")
          gh release create daily-reel --title "Daily Reel" --notes "Auto-uploaded" 2>/dev/null || true
          gh release upload daily-reel "$FILE" --clobber
          URL="https://github.com/${{ github.repository }}/releases/download/daily-reel/$FILENAME"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Video URL: $URL"

      - name: Send to Make webhook (posts to Instagram)
        run: |
          curl -X POST "${{ secrets.MAKE_INSTAGRAM_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"video_url\": \"${{ steps.upload.outputs.url }}\", \"caption\": \"${{ steps.caption.outputs.caption }}\", \"day\": ${{ steps.reel.outputs.day }}, \"reel\": \"R2\", \"type\": \"${{ steps.reel.outputs.type }}\"}"

      - name: Advance to next day + save state
        run: |
          node -e "
          const fs = require('fs');
          const state = JSON.parse(fs.readFileSync('automation/post-state.json', 'utf8'));
          state.currentDay = (state.currentDay % 90) + 1;
          if (state.currentDay === 1) state.currentBatch = (state.currentBatch || 1) + 1;
          state.lastPosted = new Date().toISOString().split('T')[0];
          fs.writeFileSync('automation/post-state.json', JSON.stringify(state, null, 2));
          console.log('Advanced to day', state.currentDay);
          "
          git config user.name  "VedaLingo Bot"
          git config user.email "rachna.lende@gmail.com"
          git add automation/post-state.json
          git diff --staged --quiet || git commit -m "chore: advance to next day after evening post [skip ci]"
          git push
