name: Evening Post — Reel 2 (6 PM IST)

on:
  schedule:
    - cron: '30 12 * * *'  # 12:30 PM UTC = 6:00 PM IST (UTC+5:30)
  workflow_dispatch:

concurrency:
  group: vedalingo-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (with LFS videos)
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd automation && npm install

      - name: Get today's reel info
        id: reel
        run: |
          STATE=$(cat automation/post-state.json)
          CURRENT_DAY=$(echo $STATE | python3 -c "import sys,json; print(json.load(sys.stdin)['currentDay'])")
          CURRENT_BATCH=$(echo $STATE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('currentBatch',1))")
          DAY_PAD=$(printf "%03d" $CURRENT_DAY)
          if [ "$CURRENT_BATCH" = "1" ]; then
            DAY_FOLDER="output/day-${DAY_PAD}"
          else
            DAY_FOLDER="output/batch-${CURRENT_BATCH}/day-${DAY_PAD}"
          fi
          FILE=$(ls ${DAY_FOLDER}/*_R2_*.mp4 | head -1)
          FILENAME=$(basename "$FILE")
          TYPE=$(echo "$FILENAME" | sed 's/Day[0-9]*_R[0-9]*_\([^_]*\)_.*/\1/')
          CONTENT_ID=$(echo "$FILENAME" | sed 's/Day[0-9]*_R[0-9]*_[^_]*_\(.*\)\.mp4/\1/')
          echo "day=$CURRENT_DAY" >> $GITHUB_OUTPUT
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "contentId=$CONTENT_ID" >> $GITHUB_OUTPUT
          echo "Day: $CURRENT_DAY, File: $FILENAME, Type: $TYPE"

      - name: Generate caption
        id: caption
        run: |
          chmod +x automation/generate-caption.sh
          DAY_OFFSET=$(( ${{ steps.reel.outputs.day }} + 2 ))
          bash automation/generate-caption.sh "${{ steps.reel.outputs.type }}" "${{ steps.reel.outputs.contentId }}" "$DAY_OFFSET" > /tmp/caption.txt
          echo "Caption saved to /tmp/caption.txt"
          cat /tmp/caption.txt

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Transcode video for YouTube compatibility
        run: |
          FILE="${{ steps.reel.outputs.file }}"
          ffmpeg -i "$FILE" -c:v libx264 -preset fast -crf 23 -c:a aac -b:a 128k -movflags +faststart /tmp/reel_transcode.mp4
          echo "Transcode complete"

      - name: Upload video to Cloudinary (permanent public URL)
        id: upload
        run: |
          DAY="${{ steps.reel.outputs.day }}"
          DAY_PAD=$(printf "%03d" $DAY)
          PUBLIC_ID="vedalingo/day${DAY_PAD}_R2_$(date +%s)"
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudinary.com/v1_1/${{ secrets.CLOUDINARY_CLOUD_NAME }}/video/upload" \
            -F "file=@/tmp/reel_transcode.mp4" \
            -F "upload_preset=vedalingo_reels" \
            -F "public_id=$PUBLIC_ID")
          VIDEO_URL=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['secure_url'])")
          echo "url=$VIDEO_URL" >> $GITHUB_OUTPUT
          echo "Video URL: $VIDEO_URL"

      - name: Send to Make webhook (posts to Instagram + YouTube)
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json
          caption = open('/tmp/caption.txt').read().strip()
          day = ${{ steps.reel.outputs.day }}
          content_type = '${{ steps.reel.outputs.type }}'
          content_id = '${{ steps.reel.outputs.contentId }}'
          word = content_id.replace('-', ' ').title()
          title = f'Sanskrit {content_type.title()}: {word} | VedaLingo #{day}'[:100]
          payload = json.dumps({
            'video_url': '${{ steps.upload.outputs.url }}',
            'caption': caption,
            'title': title,
            'filename': f'day{day:03d}_R2_{content_id}.mp4',
            'day': day,
            'reel': 'R2',
            'type': content_type
          })
          req = urllib.request.Request('${{ secrets.MAKE_INSTAGRAM_WEBHOOK }}', data=payload.encode(), headers={'Content-Type': 'application/json'})
          resp = urllib.request.urlopen(req)
          print('Webhook sent:', resp.status)
          PYEOF

      - name: Advance to next day + save state
        run: |
          python3 -c "
          import json
          with open('automation/post-state.json') as f:
              state = json.load(f)
          state['currentDay'] = (state['currentDay'] % 90) + 1
          if state['currentDay'] == 1:
              state['currentBatch'] = state.get('currentBatch', 1) + 1
          import datetime
          state['lastPosted'] = datetime.date.today().isoformat()
          with open('automation/post-state.json', 'w') as f:
              json.dump(state, f, indent=2)
          print('Advanced to day', state['currentDay'])
          "
          git config user.name  "VedaLingo Bot"
          git config user.email "rachna.lende@gmail.com"
          git add automation/post-state.json
          git diff --staged --quiet || git commit -m "chore: advance to next day after evening post [skip ci]"
          git push
