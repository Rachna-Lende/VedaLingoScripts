name: Morning Post — Reel 1 (8 AM IST)

on:
  schedule:
    - cron: '30 2 * * *'   # 2:30 AM UTC = 8:00 AM IST (UTC+5:30)
  workflow_dispatch:

concurrency:
  group: vedalingo-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (with LFS videos)
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd automation && npm install

      - name: Get today's reel info
        id: reel
        run: |
          STATE=$(cat automation/post-state.json)
          CURRENT_DAY=$(echo $STATE | python3 -c "import sys,json; print(json.load(sys.stdin)['currentDay'])")
          CURRENT_BATCH=$(echo $STATE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('currentBatch',1))")
          DAY_PAD=$(printf "%03d" $CURRENT_DAY)
          if [ "$CURRENT_BATCH" = "1" ]; then
            DAY_FOLDER="output/day-${DAY_PAD}"
          else
            DAY_FOLDER="output/batch-${CURRENT_BATCH}/day-${DAY_PAD}"
          fi
          FILE=$(ls ${DAY_FOLDER}/*_R1_*.mp4 | head -1)
          FILENAME=$(basename "$FILE")
          TYPE=$(echo "$FILENAME" | sed 's/Day[0-9]*_R[0-9]*_\([^_]*\)_.*/\1/')
          CONTENT_ID=$(echo "$FILENAME" | sed 's/Day[0-9]*_R[0-9]*_[^_]*_\(.*\)\.mp4/\1/')
          echo "day=$CURRENT_DAY" >> $GITHUB_OUTPUT
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "contentId=$CONTENT_ID" >> $GITHUB_OUTPUT
          echo "Day: $CURRENT_DAY, File: $FILENAME, Type: $TYPE"

      - name: Generate caption with Hugging Face AI
        id: caption
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          TYPE="${{ steps.reel.outputs.type }}"
          CONTENT_ID="${{ steps.reel.outputs.contentId }}"
          DAY="${{ steps.reel.outputs.day }}"

          if [ "$TYPE" = "word" ]; then
            PROMPT="Write an Instagram Reel caption for a Sanskrit word-of-the-day post about the word '${CONTENT_ID}'. Include: 1) the Sanskrit word in Devanagari script and IAST transliteration, 2) its English meaning, 3) one line of context or wisdom, 4) 'Learn Sanskrit with VedaLingo → vedalingo.in', 5) 8-10 relevant hashtags including #VedaLingo #Sanskrit #LearnSanskrit. Keep it engaging and under 200 words. Output only the caption text, nothing else."
          elif [ "$TYPE" = "grammar" ]; then
            PROMPT="Write an Instagram Reel caption for a Sanskrit grammar lesson post about '${CONTENT_ID}'. Include: 1) the grammar concept name in Sanskrit and English, 2) a simple one-line explanation, 3) one example, 4) 'Learn Sanskrit with VedaLingo → vedalingo.in', 5) 8-10 hashtags including #VedaLingo #Sanskrit #SanskritGrammar. Keep it clear and under 200 words. Output only the caption text, nothing else."
          else
            PROMPT="Write an Instagram Reel caption for a Sanskrit story/mythology post about '${CONTENT_ID}'. Include: 1) the story name, 2) a one-line hook that makes people want to watch, 3) the key lesson or wisdom, 4) 'Learn Sanskrit with VedaLingo → vedalingo.in', 5) 8-10 hashtags including #VedaLingo #Sanskrit #IndianMythology. Keep it engaging and under 200 words. Output only the caption text, nothing else."
          fi

          CAPTION=$(python3 -c "
          import urllib.request, json, os, sys
          prompt = '''$PROMPT'''
          payload = json.dumps({
            'model': 'meta-llama/Llama-3.1-8B-Instruct',
            'messages': [{'role': 'user', 'content': prompt}],
            'max_tokens': 400,
            'temperature': 0.7
          }).encode()
          req = urllib.request.Request(
            'https://router.huggingface.co/novita/v3/openai/chat/completions',
            data=payload,
            headers={
              'Authorization': 'Bearer ' + os.environ['HF_TOKEN'],
              'Content-Type': 'application/json'
            }
          )
          try:
            resp = json.loads(urllib.request.urlopen(req).read())
            print(resp['choices'][0]['message']['content'].strip())
          except urllib.error.HTTPError as e:
            body = e.read().decode()
            sys.stderr.write('HF error ' + str(e.code) + ': ' + body + '\n')
            sys.exit(1)
          ")

          # Escape for GITHUB_OUTPUT (replace newlines with \n literal)
          CAPTION_ESCAPED=$(echo "$CAPTION" | python3 -c "import sys; print(sys.stdin.read().rstrip().replace('\n', '\n'))")
          {
            echo "caption<<EOF_CAPTION"
            echo "$CAPTION"
            echo "EOF_CAPTION"
          } >> $GITHUB_OUTPUT
          echo "Caption generated: $CAPTION"

      - name: Upload video to Cloudinary (permanent public URL)
        id: upload
        run: |
          FILE="${{ steps.reel.outputs.file }}"
          DAY="${{ steps.reel.outputs.day }}"
          DAY_PAD=$(printf "%03d" $DAY)
          PUBLIC_ID="vedalingo/day${DAY_PAD}_R1_$(date +%s)"
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudinary.com/v1_1/${{ secrets.CLOUDINARY_CLOUD_NAME }}/video/upload" \
            -F "file=@$FILE" \
            -F "upload_preset=vedalingo_reels" \
            -F "public_id=$PUBLIC_ID")
          echo "Cloudinary response: $RESPONSE"
          VIDEO_URL=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['secure_url'])")
          echo "url=$VIDEO_URL" >> $GITHUB_OUTPUT
          echo "Video URL: $VIDEO_URL"

      - name: Send to Make webhook (posts to Instagram)
        run: |
          curl -s -X POST "${{ secrets.MAKE_INSTAGRAM_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"video_url\":\"${{ steps.upload.outputs.url }}\",\"caption\":\"${{ steps.caption.outputs.caption }}\",\"day\":${{ steps.reel.outputs.day }},\"reel\":\"R1\",\"type\":\"${{ steps.reel.outputs.type }}\"}"

      - name: Save updated post-state to repo
        run: |
          git config user.name  "VedaLingo Bot"
          git config user.email "rachna.lende@gmail.com"
          git add automation/post-state.json
          git diff --staged --quiet || git commit -m "chore: update post state after morning post [skip ci]"
          git push
