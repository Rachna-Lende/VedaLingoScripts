name: Morning Post — Reel 1 (8 AM IST)

on:
  schedule:
    - cron: '30 2 * * *'   # 2:30 AM UTC = 8:00 AM IST (UTC+5:30)
  workflow_dispatch:

concurrency:
  group: vedalingo-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (with LFS videos)
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd automation && npm install

      - name: Get today's reel info
        id: reel
        run: |
          node << 'EOF'
          const fs = require('fs');
          const state = JSON.parse(fs.readFileSync('automation/post-state.json', 'utf8'));
          const day = String(state.currentDay).padStart(3, '0');
          const batch = state.currentBatch || 1;
          const folder = batch === 1 ? 'output' : 'output/batch-' + batch;
          const dayFolder = folder + '/day-' + day;
          console.log('Looking in:', dayFolder);
          const files = fs.readdirSync(dayFolder).filter(f => f.includes('_R1_'));
          const file = files[0];
          console.log('Found file:', file);
          const match = file.match(/Day\d+_R\d+_([^_]+)_(.+)\.mp4/);
          const type = match[1];
          const contentId = match[2];
          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, 'day=' + state.currentDay + '\n');
          fs.appendFileSync(out, 'file=' + dayFolder + '/' + file + '\n');
          fs.appendFileSync(out, 'type=' + type + '\n');
          fs.appendFileSync(out, 'contentId=' + contentId + '\n');
          console.log('Day:', state.currentDay, 'Type:', type, 'ContentId:', contentId);
          EOF

      - name: Generate caption
        id: caption
        env:
          REEL_TYPE: ${{ steps.reel.outputs.type }}
          REEL_CONTENT_ID: ${{ steps.reel.outputs.contentId }}
          REEL_DAY: ${{ steps.reel.outputs.day }}
        run: |
          node << 'EOF'
          const { generateCaption } = require('./automation/lib/captions.js');
          const type = process.env.REEL_TYPE;
          const contentId = process.env.REEL_CONTENT_ID;
          const day = parseInt(process.env.REEL_DAY);
          const caption = generateCaption(type, contentId, day, 'morning');
          const fs = require('fs');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'caption=' + caption.replace(/\n/g, ' ') + '\n');
          console.log('Caption generated for', type, contentId);
          EOF

      - name: Upload video to GitHub release (public URL for Make)
        id: upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE="${{ steps.reel.outputs.file }}"
          FILENAME=$(basename "$FILE")
          # Create/update a release to host the video publicly
          gh release create daily-reel --title "Daily Reel" --notes "Auto-uploaded" 2>/dev/null || true
          gh release upload daily-reel "$FILE" --clobber
          URL="https://github.com/${{ github.repository }}/releases/download/daily-reel/$FILENAME"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Video URL: $URL"

      - name: Send to Make webhook (posts to Instagram)
        run: |
          curl -X POST "${{ secrets.MAKE_INSTAGRAM_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"video_url\": \"${{ steps.upload.outputs.url }}\",
              \"caption\": \"${{ steps.caption.outputs.caption }}\",
              \"day\": ${{ steps.reel.outputs.day }},
              \"reel\": \"R1\",
              \"type\": \"${{ steps.reel.outputs.type }}\"
            }"

      - name: Save updated post-state to repo
        run: |
          git config user.name  "VedaLingo Bot"
          git config user.email "rachna.lende@gmail.com"
          git add automation/post-state.json
          git diff --staged --quiet || git commit -m "chore: update post state after morning post [skip ci]"
          git push
