name: Morning Post — Reel 1 (8 AM IST)

on:
  schedule:
    - cron: '30 2 * * *'   # 2:30 AM UTC = 8:00 AM IST (UTC+5:30)
  workflow_dispatch:

concurrency:
  group: vedalingo-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (with LFS videos)
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd automation && npm install

      - name: Get today's reel info
        id: reel
        run: |
          STATE=$(cat automation/post-state.json)
          CURRENT_DAY=$(echo $STATE | python3 -c "import sys,json; print(json.load(sys.stdin)['currentDay'])")
          CURRENT_BATCH=$(echo $STATE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('currentBatch',1))")
          DAY_PAD=$(printf "%03d" $CURRENT_DAY)
          if [ "$CURRENT_BATCH" = "1" ]; then
            DAY_FOLDER="output/day-${DAY_PAD}"
          else
            DAY_FOLDER="output/batch-${CURRENT_BATCH}/day-${DAY_PAD}"
          fi
          FILE=$(ls ${DAY_FOLDER}/*_R1_*.mp4 | head -1)
          FILENAME=$(basename "$FILE")
          TYPE=$(echo "$FILENAME" | sed 's/Day[0-9]*_R[0-9]*_\([^_]*\)_.*/\1/')
          CONTENT_ID=$(echo "$FILENAME" | sed 's/Day[0-9]*_R[0-9]*_[^_]*_\(.*\)\.mp4/\1/')
          echo "day=$CURRENT_DAY" >> $GITHUB_OUTPUT
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "contentId=$CONTENT_ID" >> $GITHUB_OUTPUT
          echo "Day: $CURRENT_DAY, File: $FILENAME, Type: $TYPE"

      - name: Generate caption
        id: caption
        run: |
          TYPE="${{ steps.reel.outputs.type }}"
          CONTENT_ID="${{ steps.reel.outputs.contentId }}"
          DAY="${{ steps.reel.outputs.day }}"

          WORD=$(echo "$CONTENT_ID" | sed 's/\b\(.\)/\u\1/g' | tr '-' ' ')
          STYLE=$(( DAY % 4 ))

          if [ "$TYPE" = "word" ]; then
            if [ "$STYLE" = "0" ]; then
              CAPTION="The ancient Indians had a word for it: $WORD 🌿

One word. Thousands of years of wisdom packed inside it.

Most people go their whole lives without knowing this concept exists — watch this reel and you'll never unsee it.

📲 vedalingo.in | Learn Sanskrit, one word at a time

#Sanskrit #$WORD #AncientWisdom #VedaLingo #LearnSanskrit #IndianPhilosophy #SanskritWord #Vedanta #IndianHeritage #SanskritLearning"
            elif [ "$STYLE" = "1" ]; then
              CAPTION="$WORD — say it slowly. Feel it. 🕉️

This Sanskrit word doesn't just have a meaning — it holds a whole way of seeing the world.

Ancient sages built their lives around this concept. Watch to find out why.

📲 vedalingo.in

#VedaLingo #Sanskrit #$WORD #SanskritDaily #LearnSanskrit #AncientKnowledge #IndianWisdom #SanskritWords #Yoga #Mindfulness"
            elif [ "$STYLE" = "2" ]; then
              CAPTION="You've probably felt $WORD — you just didn't have the word for it. ✨

Sanskrit had a name for experiences we struggle to describe in English.

This is why ancient languages matter. Watch 👆

📲 Learn more at vedalingo.in

#Sanskrit #$WORD #VedaLingo #LearnSanskrit #SanskritLanguage #AncientIndia #IndianCulture #SanskritLearning #DailyWisdom #Spirituality"
            else
              CAPTION="Drop everything and learn this word: $WORD 🔥

It's Sanskrit. It's 3000+ years old. And it might be the most useful concept you learn this year.

VedaLingo makes ancient wisdom accessible — one word at a time.

📲 vedalingo.in

#VedaLingo #Sanskrit #$WORD #LearnSanskrit #AncientWisdom #SanskritWord #IndianHeritage #Vedas #Upanishads #DailyLearning"
            fi

          elif [ "$TYPE" = "grammar" ]; then
            if [ "$STYLE" = "0" ]; then
              CAPTION="This one Sanskrit rule unlocks thousands of words instantly 🔓

Most people think Sanskrit grammar is impossible. It's not — when you learn it the right way.

Today's concept: $WORD. Watch how simple it actually is.

📲 vedalingo.in

#VedaLingo #Sanskrit #SanskritGrammar #$WORD #LearnSanskrit #AncientLanguage #IndianLanguage #LanguageLearning #SanskritLessons #Linguistics"
            elif [ "$STYLE" = "1" ]; then
              CAPTION="Sanskrit grammar fact that will blow your mind 🤯

The rule '$WORD' is why Sanskrit is called the most perfectly structured language ever created.

Once you see it, you can't unsee it. Watch 👆

📲 vedalingo.in

#Sanskrit #$WORD #SanskritGrammar #VedaLingo #LearnSanskrit #IndianHeritage #AncientLanguage #Linguistics #SanskritLearning #Language"
            elif [ "$STYLE" = "2" ]; then
              CAPTION="Why Sanskrit grammar is actually beautiful 🌸

'$WORD' sounds complex. This reel makes it click in 60 seconds.

Learn the language of the Vedas, one concept at a time.

📲 vedalingo.in

#VedaLingo #Sanskrit #$WORD #SanskritGrammar #LearnSanskrit #Vedas #AncientIndia #IndianCulture #SanskritLessons #ClassicalLanguage"
            else
              CAPTION="60 seconds to understand $WORD ⏱️

This Sanskrit grammar concept is used in the Bhagavad Gita, the Ramayana, the Upanishads — everywhere.

Now you'll recognise it every time. Watch 👆

📲 vedalingo.in

#Sanskrit #$WORD #VedaLingo #SanskritGrammar #LearnSanskrit #BhagavadGita #Ramayana #Upanishads #IndianWisdom #AncientLanguage"
            fi

          else
            if [ "$STYLE" = "0" ]; then
              CAPTION="This story from ancient India will stay with you 🔥

'$WORD' — a tale from thousands of years ago that answers questions we're still asking today.

The Mahabharata knew. Watch to find out.

📲 vedalingo.in

#VedaLingo #Sanskrit #$WORD #Mahabharata #IndianMythology #AncientWisdom #IndianStories #HinduMythology #AncientIndia #IndianHeritage"
            elif [ "$STYLE" = "1" ]; then
              CAPTION="3000 years ago, this moment changed everything 🌿

The story of $WORD is one of the most powerful in all of Indian literature.

You've never heard it told like this. Watch 👆

📲 vedalingo.in

#Sanskrit #$WORD #VedaLingo #IndianMythology #Mahabharata #Ramayana #AncientIndia #IndianCulture #HinduStories #Mythology"
            elif [ "$STYLE" = "2" ]; then
              CAPTION="The lesson in this ancient story hits different 💫

'$WORD' — from India's timeless epics. One story. One truth. Told in under a minute.

Our ancestors were wise beyond measure. 🙏

📲 vedalingo.in

#VedaLingo #Sanskrit #$WORD #AncientWisdom #IndianMythology #HinduMythology #Mahabharata #IndianHeritage #Storytelling #AncientIndia"
            else
              CAPTION="If you know this story, you know India 🇮🇳

'$WORD' is the kind of tale that gets passed down through generations — because it never stops being true.

Watch before you scroll past. 🙏

📲 vedalingo.in

#VedaLingo #Sanskrit #$WORD #IndianMythology #AncientIndia #HinduStories #Mahabharata #Ramayana #IndianCulture #AncientWisdom"
            fi
          fi

          {
            echo "caption<<EOF_CAPTION"
            echo "$CAPTION"
            echo "EOF_CAPTION"
          } >> $GITHUB_OUTPUT
          echo "Caption: $CAPTION"

      - name: Upload video to Cloudinary (permanent public URL)
        id: upload
        run: |
          FILE="${{ steps.reel.outputs.file }}"
          DAY="${{ steps.reel.outputs.day }}"
          DAY_PAD=$(printf "%03d" $DAY)
          PUBLIC_ID="vedalingo/day${DAY_PAD}_R1_$(date +%s)"
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudinary.com/v1_1/${{ secrets.CLOUDINARY_CLOUD_NAME }}/video/upload" \
            -F "file=@$FILE" \
            -F "upload_preset=vedalingo_reels" \
            -F "public_id=$PUBLIC_ID")
          echo "Cloudinary response: $RESPONSE"
          VIDEO_URL=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['secure_url'])")
          echo "url=$VIDEO_URL" >> $GITHUB_OUTPUT
          echo "Video URL: $VIDEO_URL"

      - name: Send to Make webhook (posts to Instagram)
        run: |
          curl -s -X POST "${{ secrets.MAKE_INSTAGRAM_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"video_url\":\"${{ steps.upload.outputs.url }}\",\"caption\":\"${{ steps.caption.outputs.caption }}\",\"day\":${{ steps.reel.outputs.day }},\"reel\":\"R1\",\"type\":\"${{ steps.reel.outputs.type }}\"}"

      - name: Save updated post-state to repo
        run: |
          git config user.name  "VedaLingo Bot"
          git config user.email "rachna.lende@gmail.com"
          git add automation/post-state.json
          git diff --staged --quiet || git commit -m "chore: update post state after morning post [skip ci]"
          git push
