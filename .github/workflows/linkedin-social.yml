name: Daily Social Post — LinkedIn (8 AM IST)

on:
  schedule:
    - cron: '35 2 * * *'   # 8:05 AM IST (5 min after morning reel)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout VedaLingo app
        uses: actions/checkout@v4
        with:
          repository: Rachna-Lende/VedaLingo
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd vac && npm install

      - name: Generate and send LinkedIn post
        run: node vac/scripts/marketing/post-linkedin-webhook.mjs
