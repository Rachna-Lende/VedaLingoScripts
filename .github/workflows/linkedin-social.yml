name: Daily Social Post — LinkedIn + Facebook (8 AM IST)

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout VedaLingo app
        uses: actions/checkout@v4
        with:
          repository: Rachna-Lende/VedaLingo
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd vac && npm install

      - name: Run daily social post
        env:
          LINKEDIN_ACCESS_TOKEN:    ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:         ${{ secrets.FACEBOOK_PAGE_ID }}
        run: node vac/scripts/marketing/daily-post.mjs
