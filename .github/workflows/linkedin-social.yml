name: Daily Social Post — LinkedIn (8 AM IST)

on:
  schedule:
    - cron: '35 2 * * *'   # 8:05 AM IST (5 min after morning reel)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Send to LinkedIn Make webhook
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, datetime

          today = datetime.date.today()
          day_of_week = today.strftime('%A')
          date_str = today.strftime('%d %B %Y')

          # Rotate through content types by day of week
          types = ['mahabharata-dilemma', 'grammar-deep', 'ramayana-story',
                   'feature-spotlight', 'philosophy-quiz', 'shloka-deep', 'sanskrit-science']
          content_type = types[today.weekday()]

          payload = json.dumps({
            'platform': 'linkedin',
            'type': content_type,
            'date': today.isoformat(),
          })

          req = urllib.request.Request(
            'https://hook.eu1.make.com/mh8i54lbfad36arjwrtc6ndmrl1vnciw',
            data=payload.encode(),
            headers={'Content-Type': 'application/json'}
          )
          resp = urllib.request.urlopen(req)
          print('LinkedIn webhook sent:', resp.status)
          PYEOF
